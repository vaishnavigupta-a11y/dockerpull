version: '3.8'

services:
  db:
    image: postgres:15
    container_name: db
    environment:
      POSTGRES_USER: vaishnavi
      POSTGRES_PASSWORD: vaishnavi
      POSTGRES_DB: fastjwt
    # Tester के PC पर अगर 5432 खाली नहीं है, तो ये लाइन हटा सकते हैं
    ports:
      - "5432:5432"

  web:
    image: 1080171/1mygenuiimage
    container_name: my-app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://vaishnavi:vaishnavi@db:5432/fastjwt

